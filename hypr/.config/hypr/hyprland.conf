#exec-once = flatpak run me.timschneeberger.jdsp4linux --tray
exec-once = easyeffects --window=hide

#exec-once = solaar --window=hide

bind = , double_click, fullscreen, 1
# Toggle TV
bind = SUPER, T, exec, ~/.config/hypr/scripts/toggle_tv.sh

bind = SUPER, PRINT, exec, grimblast copysave screen ~/Pictures/Screenshots/$(date +%Y-%m-%d_%H-%M-%S).png
#bind = SUPER SHIFT, S, exec, grimblast  copysave area ~/Pictures/Screenshots/$(date +%Y-%m-%d_%H-%M-%S).png  
