windowrulev = center, title:^(NetworkManager)$
windowrulev = size 800 600, title:^(NetworkManager)$

windowrulev = float, title:^(System Monitor)$
windowrulev = center, title:^(System Monitor)$
windowrulev = size 900 700, title:^(System Monitor)$

windowrulev = float, title:^(Disk Usage)$
windowrulev = center, title:^(Disk Usage)$
windowrulev = size 800 600, title:^(Disk Usage)$

windowrulev = float, title:^(Audio Control)$
windowrulev = center, title:^(Audio Control)$
