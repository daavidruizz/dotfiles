# BACKGROUND
background {
    monitor = 
    path = ~/Pictures/wallpapers/puente_nubes.jpg
    blur_passes = 1
    #contrast = 0.8916
    #brightness = 0.8172
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
    reload_cmd = ls ~/wallpapers/*.{jpg,jpeg,png,webp} | shuf -n 1
}

# GENERAL
general {
}

# Profie-Photo
image {
    monitor =
    path = ~/Pictures/profle.jpg
    border_size = 2
    border_color = rgba(255, 255, 255, 0)
    size = 130
    rounding = -1
    rotate = 0
    reload_time = -1
    reload_cmd = 
    position = 0, 40
    halign = center
    valign = center
}

# Day-Month-Date
label {
    monitor =
    text = cmd[update:1000] echo -e "$(date +"%A, %B %d")"
    color = rgba(216, 222, 233, 1.0)
    font_size = 25
    font_family = SF Pro Display Bold
    position = 0, 350
    halign = center
    valign = center
}

# Time
label {
    monitor =
    text = cmd[update:1000] echo "<span>$(date +"%H:%M")</span>"
    color = rgba(216, 222, 233, 1.0)
    font_size = 120
    font_family = SF Pro Display Bold
    position = 0, 250
    halign = center
    valign = center
}

# USER-BOX
shape {
    monitor =
    size = 300, 60
    color = rgba(255, 255, 255, 0.9)
    rounding = -1
    border_size = 0
    border_color = rgba(253, 198, 135, 0)
    rotate = 0
    xray = false # if true, make a "hole" in the background (rectangle of specified size, no rotation)

    position = 0, -130
    halign = center
    valign = center
}

# USER
label {
    monitor =
    text =     $USER
    color = rgba(45, 45, 45, 0.80)
    #outline_thickness = 2
    #dots_size = 0.2 # Scale of input-field height, 0.2 - 0.8
    #dots_spacing = 0.2 # Scale of dots' absolute size, 0.0 - 1.0
    #dots_center = true
    font_size = 18
    font_family = SF Pro Display Bold
    position = 0, -130
    halign = center
    valign = center
}

# INPUT FIELD
input-field {
    monitor =
    size = 300, 60
    outline_thickness = 2
    dots_size = 0.2 # Scale of input-field height, 0.2 - 0.8
    dots_spacing = 0.2 # Scale of dots' absolute size, 0.0 - 1.0
    dots_center = true
    outer_color = rgba(0, 0, 0, 0)
    inner_color = rgba(255, 255, 255, 0.5)
    font_color = rgb(45, 45, 45)
    fade_on_empty = false
    font_family = SF Pro Display Bold
    placeholder_text = <i><span foreground="##2d2d2dcc">Pass</span></i>
    hide_input = false
    position = 0, -210
    halign = center
    valign = center
}

