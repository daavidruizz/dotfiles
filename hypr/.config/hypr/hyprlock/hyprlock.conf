    monitor =
    text = cmd[update:2000] ~/.config/hypr/scripts/songdetail.sh title
    color = rgba(255, 255, 255, 0.9)
    font_size = 16
    font_family = SF Pro Display Bold
    position = 0, -460
    halign = center
    valign = center
}

# Artista
label {
    monitor =
    text = cmd[update:2000] ~/.config/hypr/scripts/songdetail.sh artist
    color = rgba(255, 255, 255, 0.6)
    font_size = 14
    font_family = SF Pro Display Bold
    position = 0, -485
    halign = center
    valign = center
}

# Álbum
label {
    monitor =
    text = cmd[update:2000] ~/.config/hypr/scripts/songdetail.sh album
    color = rgba(255, 255, 255, 0.4)
    font_size = 12
    font_family = SF Pro Display Bold
    position = 0, -505
    halign = center
    valign = center
}
