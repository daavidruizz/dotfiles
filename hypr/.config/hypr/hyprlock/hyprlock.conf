# Carátula
image {
    monitor =
    path = /tmp/hyprlock-cover.jpg
    reload_time = 2
    reload_cmd = ~/.config/hypr/scripts/songcover.sh
    size = 130
    rounding = 5
    position = 0, -360
    halign = center
    valign = center
}

# Título
